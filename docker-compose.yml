name: km0

services:
  km0-web:
    build:
      context: .
      args:
        CLOUD_ADMIN_USER: ${CLOUD_ADMIN_USER}
        CLOUD_APP_TOKEN: ${CLOUD_APP_TOKEN}
    container_name: km0-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:9180:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - km0

networks:
  km0:
    name: km0

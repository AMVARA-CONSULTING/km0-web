name: km0

services:
  km0-web:
    build:
      context: .
      args:
        CLOUD_ADMIN_USER: ${CLOUD_ADMIN_USER}
        CLOUD_APP_TOKEN: ${CLOUD_APP_TOKEN}
    container_name: km0-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:9180:80"
    extra_hosts:
      # host-gateway resolves to docker0 (often down); km0 subnet gateway is fixed below.
      - "host.docker.internal:172.21.0.1"
    networks:
      - km0

networks:
  km0:
    name: km0
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

name: km0

services:
  km0-web:
    build:
      context: .
      args:
        CLOUD_ADMIN_USER: ${CLOUD_ADMIN_USER}
        CLOUD_APP_TOKEN: ${CLOUD_APP_TOKEN}
    container_name: km0-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:9180:80"
    networks:
      - km0
    depends_on:
      - km0-ideas-receiver

  km0-ideas-receiver:
    build:
      context: .
      dockerfile: Dockerfile.receiver
    container_name: km0-ideas-receiver
    restart: unless-stopped
    ports:
      - "127.0.0.1:9181:9000"
    environment:
      KM0_IDEAS_QUEUE: /var/spool/km0-ideas/incoming
    volumes:
      - /var/spool/km0-ideas/incoming:/var/spool/km0-ideas/incoming
    command:
      - -verbose
      - -hooks=/hooks/hooks.json
    networks:
      - km0

networks:
  km0:
    name: km0

map $uri $km0_not_found_page {
    ~^/ca/   /ca/404/index.html;
    ~^/en/   /en/404/index.html;
    ~^/de/   /de/404/index.html;
    default  /404.html;
}

map $uri $km0_forbidden_page {
    ~^/ca/   /ca/403/index.html;
    ~^/en/   /en/403/index.html;
    ~^/de/   /de/403/index.html;
    default  /403/index.html;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    error_page 403 $km0_forbidden_page;
    error_page 404 $km0_not_found_page;

    location = /404.html {
        internal;
    }

    location = /403/index.html {
        internal;
    }

    location = /ca/404/index.html {
        internal;
    }

    location = /ca/403/index.html {
        internal;
    }

    location = /en/404/index.html {
        internal;
    }

    location = /en/403/index.html {
        internal;
    }

    location = /de/404/index.html {
        internal;
    }

    location = /de/403/index.html {
        internal;
    }

    location = /cloud {
        return 301 /#cloud-users;
    }

    location = /cloud/ {
        return 301 /#cloud-users;
    }

    location = /ca/cloud {
        return 301 /ca/#cloud-users;
    }

    location = /ca/cloud/ {
        return 301 /ca/#cloud-users;
    }

    location = /en/cloud {
        return 301 /en/#cloud-users;
    }

    location = /en/cloud/ {
        return 301 /en/#cloud-users;
    }

    location = /de/cloud {
        return 301 /de/#cloud-users;
    }

    location = /de/cloud/ {
        return 301 /de/#cloud-users;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /hooks/ideas {
        proxy_pass http://host.docker.internal:9181/hooks/ideas;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
}
